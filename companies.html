<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Companies - ERP v26.3.1</title>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body>
    <div id="app" class="app-container">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="navbar-container">
          <div class="navbar-center" style="width: 100%; display: flex; justify-content: center;">
            <h1 class="navbar-title">Companies</h1>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="main-content">
        <div class="content-stack" style="gap: 1.5rem;">
          <!-- Search Bar -->
          <div class="search-container">
            <input type="text" id="company-search" class="search-input" placeholder="< --- Search Bar --- >" style="text-align: center;">
          </div>

          <!-- Create Button -->
          <div class="action-container">
            <button id="create-company-btn" class="btn-primary-full">Create New Company</button>
          </div>

          <!-- Companies Table Section -->
          <div class="section-container" style="margin-top: 1rem;">
            <h2 class="section-title" style="font-size: 1.125rem; color: var(--color-slate-900); text-transform: none; letter-spacing: normal;">Your Companies</h2>
            <div class="table-container" style="min-height: 400px; display: flex; flex-direction: column;">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Company Name</th>
                    <th>Owned by</th>
                    <th>State</th>
                    <th>Sales</th>
                    <th>Purchases</th>
                    <th>Account Balance</th>
                    <th style="width: 120px; text-align: center;">Actions</th>
                  </tr>
                </thead>
                <tbody id="companies-body">
                  <!-- Companies will be injected here -->
                </tbody>
              </table>
              <div id="empty-list-placeholder" style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--color-slate-400); font-weight: 700;">
              
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Confirmation Modal -->
      <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <h3 class="modal-title">Delete Company</h3>
          <p class="modal-text">Are you sure you want to delete this company? This action cannot be undone.</p>
          <div class="modal-actions">
            <button id="cancel-delete" class="btn-secondary">Cancel</button>
            <button id="confirm-delete" class="btn-danger">Delete</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/companies.js"></script>
  </body>
</html>
